<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – DNSTT Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-8">
      <div class="text-center mb-8">
        <h1 class="text-xl font-semibold text-slate-800">DNSTT SSH Panel</h1>
        <p class="text-slate-500 text-sm mt-1">Sign in to manage tunnel users</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="mb-4 p-3 rounded-lg text-sm {{ 'bg-red-50 text-red-700' if category == 'error' else 'bg-emerald-50 text-emerald-700' }}">
              {{ msg }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('login') }}" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
          <input type="text" id="username" name="username" required autofocus
                 class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-400 focus:border-slate-400">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-400 focus:border-slate-400">
        </div>
        <button type="submit" class="w-full py-2.5 bg-slate-800 text-white font-medium rounded-lg hover:bg-slate-700 focus:ring-2 focus:ring-offset-2 focus:ring-slate-600">
          Sign in
        </button>
      </form>
    </div>
    <p class="text-center text-slate-500 text-xs mt-4">SSH tunnel user management</p>
  </div>
</body>
</html>
